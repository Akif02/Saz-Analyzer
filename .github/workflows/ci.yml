name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Job: Testet isoliert den Python ML-Service
  test-ml:
    name: Python ML Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Install dependencies
      working-directory: ./ml
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-test.txt
    - name: Run pytest
      working-directory: ./ml
      run: pytest test_main.py

  # 2. Job: Testet isoliert das Java Spring Boot Backend
  test-backend:
    name: Java Backend Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Run Maven Tests
      working-directory: ./backend
      # 'chmod +x mvnw' stellt sicher, dass der Wrapper auf dem Linux-Server ausführbar ist
      run: |
        chmod +x mvnw
        ./mvnw test

  # 3. Job: Testet die gesamte E2E Pipeline (Frontend -> Java -> Python)
  # Dieser Job startet erst, wenn die Unit-Tests oben erfolgreich waren.
  test-e2e:
    name: System E2E Pipeline
    runs-on: ubuntu-latest
    needs: [test-ml, test-backend]
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        
    - name: Install ML & System Test Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ml/requirements.txt
        pip install -r system_test/requirements.txt
        
    - name: Start ML Service in Background
      working-directory: ./ml
      run: |
        python main.py &
        sleep 5  # Warte kurz, bis der Python Server hochgefahren ist
        
    - name: Start Java Backend in Background
      working-directory: ./backend
      run: |
        chmod +x mvnw
        ./mvnw spring-boot:run &
        sleep 20 # Warte, bis Spring Boot komplett geladen ist
        
    - name: Run E2E Pipeline Test
      working-directory: ./system_test
      run: pytest test_pipeline.py
